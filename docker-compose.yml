  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./.env
    # depends_on:
    #   localstack:
    #     condition: service_healthy
    #   localstack-init:
    #     condition: service_completed_successfully

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8082:8082"
    env_file:
      - ./.env
    volumes:
      - ./backend:/workspace
      - maven-cache:/root/.m2
    stdin_open: true
    tty: true
    depends_on:
      # localstack:
      #   condition: service_healthy
      # localstack-init:
      #   condition: service_completed_successfully
      mcp-server:
        condition: service_started

  backend-prod:
    profiles:
      - prod
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:8082:8080"
    env_file:
      - ./.env
    depends_on:
      # localstack:
      #   condition: service_healthy
      # localstack-init:
      #   condition: service_completed_successfully
      mcp-server:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - VITE_BACKEND_URL=http://127.0.0.1:8082
      - VITE_CHAT_WS_URL=ws://127.0.0.1:8082
      # When accessed from the browser, the frontend must point to the host-mapped AI port
      - VITE_AI_UPLOAD_URL=http://ai:8002
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    stdin_open: true
    tty: true

  frontend-prod:
    profiles:
      - prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend-prod:
        condition: service_started

  ai:
    build:
      context: ./AI
      dockerfile: docker/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ./.env
    volumes:
      - ./AI:/workspace
    # depends_on:
      # localstack:
      #   condition: service_healthy
      # localstack-init:
      #   condition: service_completed_successfully



volumes:
  # localstack-data:
  maven-cache:
  frontend-node-modules:
