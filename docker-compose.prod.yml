services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,s3
      - AWS_DEFAULT_REGION=us-east-1
      - DDB_TABLE_NAME=fatec-ai-bot-core
      - DDB_SEED_EXAMPLES=true
      - BUCKET_NAME=fatec-ai-bot-bucket
      - DEBUG=0
    volumes:
      - ./backend/localstack/init/ready.d:/etc/localstack/init/ready.d
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "bash", "-c", "awslocal dynamodb list-tables --region $$AWS_DEFAULT_REGION >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  localstack-init:
    image: localstack/localstack:3.8
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DDB_TABLE_NAME=fatec-ai-bot-core
      - BUCKET_NAME=fatec-ai-bot-bucket
      - LOCALSTACK_HOST=localstack
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >-
        set -eu;
        awslocal --version || true;
        echo "[localstack-init] ensuring bucket $${BUCKET_NAME}";
        if ! awslocal s3api head-bucket --bucket "$${BUCKET_NAME}" >/dev/null 2>&1; then awslocal s3 mb "s3://$${BUCKET_NAME}"; fi;
        echo "[localstack-init] ensuring dynamodb table $${DDB_TABLE_NAME}";
        if ! awslocal dynamodb describe-table --table-name "$${DDB_TABLE_NAME}" >/dev/null 2>&1; then
          awslocal dynamodb create-table --table-name "$${DDB_TABLE_NAME}" --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S AttributeName=gsi1pk,AttributeType=S AttributeName=gsi1sk,AttributeType=S AttributeName=gsi2pk,AttributeType=S AttributeName=gsi2sk,AttributeType=S --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE --global-secondary-indexes '[{"IndexName":"gsi1-email","KeySchema":[{"AttributeName":"gsi1pk","KeyType":"HASH"},{"AttributeName":"gsi1sk","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},{"IndexName":"gsi2-unit-content","KeySchema":[{"AttributeName":"gsi2pk","KeyType":"HASH"},{"AttributeName":"gsi2sk","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' --billing-mode PAY_PER_REQUEST --region "$${AWS_DEFAULT_REGION}" >/dev/null;
        fi;
        echo "[localstack-init] done";
    restart: "no"

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./.env
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: fatec-backend:prod
    restart: unless-stopped
    ports:
      - "8082:8080"
    env_file:
      - ./.env
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
      mcp-server:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: fatec-frontend:prod
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - VITE_BACKEND_URL=http://127.0.0.1:8082
      - VITE_CHAT_WS_URL=ws://127.0.0.1:8082
      - VITE_AI_UPLOAD_URL=http://ai:8002
    depends_on:
      - backend
    networks:
      - fatec-net

  ai:
    build:
      context: ./AI
      dockerfile: docker/Dockerfile
    image: fatec-ai:prod
    ports:
      - "8002:8002"
    env_file:
      - ./.env
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully

networks:
  fatec-net:
    driver: bridge

volumes:
  localstack-data:
