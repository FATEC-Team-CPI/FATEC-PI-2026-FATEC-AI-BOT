version: '3.9'

services:
  # MCP Server Python
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fatec-mcp-server
    ports:
      - "8001:8001"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - MCP_ENV=production
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    networks:
      - fatec-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Vector DB - ChromaDB (opcional, para MVP)
