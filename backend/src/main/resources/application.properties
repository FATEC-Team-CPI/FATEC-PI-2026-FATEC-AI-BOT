#################################################################
# CONFIGURAÇÕES GERAIS DA APLICAÇÃO
#################################################################
quarkus.http.port=${QUARKUS_HTTP_PORT:8080}
quarkus.http.host=${QUARKUS_HTTP_HOST:0.0.0.0}
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8080,http://localhost:8080
quarkus.http.cors.methods=GET,POST,OPTIONS

# Configurações para mitigar thread blocked no dev mode
quarkus.vertx.event-loops-pool-size=2
quarkus.vertx.max-event-loop-execute-time=10s

#################################################################
# CONFIGURAÇÃO DO CLIENTE REST (GROQ)
#################################################################
# A chave "groq-api" deve casar com o configKey na interface GroqRestClient
quarkus.rest-client.groq-api.url=https://api.groq.com/openai/v1
quarkus.rest-client.groq-api.connect-timeout=10000
quarkus.rest-client.groq-api.read-timeout=30000

#################################################################
# LANGCHAIN4J + GROQ + MCP
#################################################################
quarkus.langchain4j.openai.api-key=${GROQ_API_KEY:dummy-key}
quarkus.langchain4j.openai.base-url=https://api.groq.com/openai/v1
quarkus.langchain4j.openai.chat-model.model-name=meta-llama/llama-4-scout-17b-16e-instruct
quarkus.langchain4j.openai.timeout=30s
groq.api.key=${GROQ_API_KEY:dummy-key}
mcp.server.url=${MCP_SERVER_URL:http://localhost:8001}

# MCP client (SSE)
quarkus.langchain4j.mcp.fatec-docs.transport-type=http
quarkus.langchain4j.mcp.fatec-docs.url=${MCP_SERVER_URL:http://localhost:8001}/sse

#################################################################
# SEGURANÇA (JWT)
#################################################################
quarkus.smallrye-jwt.enabled=true
smallrye.jwt.sign.key.secret=meu-secreto-super-secreto-que-ninguem-descobre-nunca=
mp.jwt.verify.issuer=fatec-auth
quarkus.smallrye-jwt.expiration=3600

#################################################################
# OPENAPI / SWAGGER
#################################################################
quarkus.smallrye-openapi.info-title=FATEC AI BOT Backend API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.path=/openapi
%dev.quarkus.swagger-ui.always-include=true
%dev.quarkus.swagger-ui.path=/swagger

#################################################################
# INFRAESTRUTURA (DYNAMO)
#################################################################
app.dynamodb.table-name=fatec-ai-bot-core
dynamodb.table.conteudos=fatec-ai-bot-core
bucket.name=fatec-ai-bot-bucket

# Configuração de ambiente de desenvolvimento (LocalStack)
%dev.quarkus.dynamodb.endpoint-override=http://localhost:4566
%dev.quarkus.dynamodb.aws.region=us-east-1
%dev.quarkus.dynamodb.aws.credentials.type=static
%dev.quarkus.dynamodb.aws.credentials.static-provider.access-key-id=test
%dev.quarkus.dynamodb.aws.credentials.static-provider.secret-access-key=test

# --- S3 Configuração ---
quarkus.s3.endpoint-override=${QUARKUS_S3_ENDPOINT_OVERRIDE:http://localstack:4566}
quarkus.s3.aws.region=${QUARKUS_S3_AWS_REGION:us-east-1}
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=test
quarkus.s3.aws.credentials.static-provider.secret-access-key=test
# ISSO AQUI É OBRIGATÓRIO PARA O LOCALSTACK FUNCIONAR NO DOCKER:
quarkus.s3.path-style-access=true


# Configuração para Docker (container)
quarkus.dynamodb.endpoint-override=${QUARKUS_DYNAMODB_ENDPOINT_OVERRIDE:http://localhost:4566}
quarkus.dynamodb.aws.region=${QUARKUS_DYNAMODB_AWS_REGION:us-east-1}
quarkus.dynamodb.aws.credentials.type=${QUARKUS_DYNAMODB_AWS_CREDENTIALS_TYPE:static}
quarkus.dynamodb.aws.credentials.static-provider.access-key-id=${QUARKUS_DYNAMODB_AWS_CREDENTIALS_STATIC_PROVIDER_ACCESS_KEY_ID:test}
quarkus.dynamodb.aws.credentials.static-provider.secret-access-key=${QUARKUS_DYNAMODB_AWS_CREDENTIALS_STATIC_PROVIDER_SECRET_ACCESS_KEY:test}

# Configuração de produção
%prod.quarkus.dynamodb.aws.region=${AWS_REGION:us-east-1}
%prod.quarkus.dynamodb.aws.credentials.type=default

