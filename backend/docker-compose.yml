services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fatec-ai-bot-backend-dev
    ports:
      - "8081:8080"
      - "5005:5005"
    environment:
      - QUARKUS_DEVSERVICES_ENABLED=false
      - QUARKUS_DYNAMODB_ENDPOINT_OVERRIDE=http://localstack:4566
    volumes:
      - .:/workspace
      - ~/.m2:/root/.m2
    working_dir: /workspace
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - fatec-network

  localstack:
    image: localstack/localstack-pro
    container_name: localstack
    ports:
      - "4566:4566"
    env_file: .env
    environment:
      - SERVICES=dynamodb
      - AWS_DEFAULT_REGION=us-east-1
      - DDB_TABLE_NAME=fatec-ai-bot-core
      - DDB_SEED_EXAMPLES=true
      - DEBUG=0
    volumes:
      - ./localstack/init/ready.d:/etc/localstack/init/ready.d
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "bash", "-c", "awslocal dynamodb list-tables --region $$AWS_DEFAULT_REGION >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - fatec-network

volumes:
  localstack-data:

networks:
  fatec-network:
    name: fatec-network
    driver: bridge
